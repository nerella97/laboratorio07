<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <aside>

        <div class="logo">
            <img src="insta_logo.png" alt="Instagram">
        </div>

        <nav>
            <a href="#">🏠 Home</a>
            <a href="#">🔍 Search</a>
            <a href="#">🧭 Explore</a>
            <a href="#">🎬 Reels</a>
            <a href="#">💬 Messages</a>
            <a href="#">❤️ Notifications</a>
            <a href="#">➕ Create</a>
            <a href="#">👤 Profile</a>
        </nav>

    </aside>

    <main>

        <section class="historias">

            <div class="story">
                <img src="circul_1.webp" alt="Historia 1">
            </div>

            <div class="story">
                <img src="circul_2.jpeg" alt="Historia 2">
            </div>

            <div class="story">
                <img src="circul_3.jpg" alt="Historia 3">
            </div>

            <div class="story">
                <img src="circul_4.jpg" alt="Historia 4">
            </div>

            <div class="story">
                <img src="circul_5.jpg" alt="Historia 5">
            </div>

            <div class="story">
                <img src="circul_6.jpg" alt="Historia 6">
            </div>

        </section>

        <article class="post">

            <div class="post-header">
                <img class="avatar" src="user_insta_1.png" alt="Usuario 1">
                <span>usuario_01</span>
            </div>

            <img class="post-image"
                 src="insta_pub_01.jpg"
                 alt="Publicación 1">

            <div class="acciones">
                ❤️ 💬 📤
            </div>

            <p>Primera publicación.</p>

        </article>

        <article class="post">

            <div class="post-header">
                <img class="avatar" src="user_insta_2.jpg" alt="Usuario 2">
                <span>usuario_02</span>
            </div>

            <img class="post-image"
                 src="insta_pub_02.jpg"
                 alt="Publicación 2">

            <div class="acciones">
                ❤️ 💬 📤
            </div>

            <p>Segunda publicación.</p>

        </article>

    </main>

</body>
</html>
